name: Daily Partnerships Analysis

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Look-back window in days'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run partnerships analysis
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DAYS: ${{ github.event.inputs.days || '1' }}
        run: python -m src.cli run --days "$DAYS"

      - name: Commit and push report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/analysis/
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily partnerships analysis report"
            git push
          else
            echo "No changes to commit."
          fi
